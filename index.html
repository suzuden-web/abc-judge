<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC判定ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;
  --text:#e8e8f0;--text-dim:#8888a0;--text-muted:#555568;
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);--green-border:rgba(34,197,94,.25);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,.08);--yellow-border:rgba(234,179,8,.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);--red-border:rgba(239,68,68,.25);
  --accent:#6366f1;--accent-bg:rgba(99,102,241,.08);
  --radius:12px;--radius-sm:8px;
}
html{font-size:15px}
body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.7;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%,rgba(99,102,241,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 100%,rgba(34,197,94,.04) 0%,transparent 60%);
}
.app{max-width:640px;margin:0 auto;padding:24px 16px 80px}
header{text-align:center;padding:40px 0 32px}
header h1{
  font-size:1.8rem;font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--text) 0%,var(--text-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header p{color:var(--text-dim);font-size:.85rem;margin-top:8px;font-weight:300}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:all .3s ease;
}
.card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 32px rgba(99,102,241,.1)}
.quiz-section{display:none}
.quiz-section.visible{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.question-card{position:relative;overflow:hidden}
.question-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);
}
.q-number{
  font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;
  color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;
}
.q-text{font-size:1.05rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.q-group{
  font-size:.7rem;font-weight:500;margin-bottom:16px;padding:4px 10px;
  border-radius:12px;display:inline-block;
}
.q-group.A{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.q-group.B{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.q-group.C{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-row{display:flex;gap:10px}
.btn{
  flex:1;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface2);color:var(--text);font-family:inherit;
  font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s ease;text-align:center;
}
.btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.btn:active{transform:scale(.97)}
.btn-yes{border-color:var(--green-border);background:var(--green-bg)}
.btn-yes:hover{border-color:var(--green);box-shadow:0 0 16px rgba(34,197,94,.15)}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;border-radius:2px}
.result-section{display:none}
.result-section.visible{display:block;animation:fadeUp .5s ease}
.result-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:20px;font-weight:700;font-size:.85rem;margin-bottom:16px;
}
.result-badge.A{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.result-badge.B{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:var(--yellow)}
.result-badge.C{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.result-title{font-size:1.3rem;font-weight:900;margin-bottom:6px}
.result-desc{color:var(--text-dim);font-size:.85rem;margin-bottom:20px;line-height:1.6}
.strategy-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tag{
  padding:4px 12px;border-radius:16px;font-size:.75rem;font-weight:500;
  border:1px solid var(--border);color:var(--text-dim);background:var(--surface2);
}
.prompt-block{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:12px;overflow:hidden;
}
.prompt-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;border-bottom:1px solid var(--border);
}
.prompt-label{font-size:.75rem;font-weight:600;color:var(--text-dim);letter-spacing:.05em}
.copy-btn{
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text-dim);font-family:inherit;
  font-size:.7rem;cursor:pointer;transition:all .2s ease;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}
.prompt-body{
  padding:16px;font-family:'IBM Plex Mono',monospace;font-size:.78rem;
  line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-all;
}
.token-map{
  display:grid;grid-template-columns:auto 1fr;gap:6px 16px;
  padding:16px;background:var(--surface2);border-radius:var(--radius-sm);margin-top:12px;font-size:.8rem;
}
.token-map dt{font-weight:600;color:var(--accent);font-family:'IBM Plex Mono',monospace}
.token-map dd{color:var(--text-dim)}
.rules-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,10,15,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);padding:10px 16px;
  display:flex;justify-content:center;gap:20px;
  font-size:.7rem;color:var(--text-muted);z-index:100;
}
.rules-bar span{display:flex;align-items:center;gap:4px}
.rules-bar .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}
.reset-btn{
  display:block;margin:24px auto 0;padding:10px 32px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text-dim);font-family:inherit;
  font-size:.85rem;cursor:pointer;transition:all .2s ease;
}
.reset-btn:hover{border-color:var(--accent);color:var(--text)}
.lost-btn{
  display:block;margin:12px auto 0;padding:8px 24px;
  border:1px dashed var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text-muted);font-family:inherit;
  font-size:.78rem;cursor:pointer;transition:all .2s ease;
}
.lost-btn:hover{border-color:var(--yellow);color:var(--yellow)}
@media(max-width:480px){
  html{font-size:14px}
  .app{padding:16px 12px 72px}
  header{padding:28px 0 24px}
  .rules-bar{gap:10px;font-size:.6rem;padding:8px 12px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ABC 判定ツール</h1>
    <p>AI作業振り分け — 5秒で戦略を決定</p>
  </header>

  <div id="quiz" class="quiz-section visible">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="question-container" class="card question-card active">
      <div id="q-group" class="q-group A"></div>
      <div class="q-number" id="q-step">STEP 1 / 12</div>
      <div class="q-text" id="q-text"></div>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="answer(true)">はい</button>
        <button class="btn btn-no" onclick="answer(false)">いいえ</button>
      </div>
    </div>
    <button class="lost-btn" onclick="showLost()">判断に迷っている…</button>
  </div>

  <div id="result" class="result-section">
    <div class="card">
      <div class="result-badge" id="r-badge"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-desc" id="r-desc"></div>
      <div class="strategy-row" id="r-tags"></div>
      <div class="token-map" id="r-token"></div>
    </div>
    <div id="prompts-container"></div>
    <button class="reset-btn" onclick="reset()">もう一度判定する</button>
  </div>

  <div id="lost" class="result-section">
    <div class="card">
      <div class="result-badge B">迷った時の裏技</div>
      <div class="result-title">AIに判定させる</div>
      <div class="result-desc">以下のプロンプトをそのまま投げて、A/B/Cの判定をAI自身にさせましょう。</div>
    </div>
    <div class="prompt-block">
      <div class="prompt-header">
        <span class="prompt-label">判定依頼プロンプト</span>
        <button class="copy-btn" id="lost-copy">コピー</button>
      </div>
      <div class="prompt-body" id="lost-prompt">以下の作業について、どの戦略で進めるべきか判定して。

A（単発修正）：1関数・原因明確・1〜2行で説明可能
B（設計＋実装）：新機能・複数関数・既存ロジック変更
C（段階解析）：原因不明・複数ファイル・全体把握が必要

やりたいこと：
（ここに記述）

理由も教えて。</div>
    </div>
    <button class="reset-btn" onclick="reset()">判定に戻る</button>
  </div>
</div>

<div class="rules-bar">
  <span><span class="dot"></span>目的を必ず書く</span>
  <span><span class="dot"></span>最終コードを1つに</span>
  <span><span class="dot"></span>不要な変更はしない</span>
</div>

<script>
var questionsA = [
  '触るのは1つの関数だけ？',
  'エラー箇所が関数名で特定できる？',
  '修正内容を1〜2行で説明できる？',
  '「〜して」「直して」で済む依頼？'
];
var questionsB = [
  '新機能を追加する作業？',
  '複数の関数に影響がある？',
  '既存ロジックを変更する？',
  '「〜のような機能」と説明している？'
];
var questionsC = [
  'どこが原因か分からない？',
  '複数ファイルにまたがる？',
  '「全体を見て」と言いたい？',
  'コピペしたくなるほどコード量が多い？'
];

var allGroups = [
  { id: 'A', label: 'A判定チェック', questions: questionsA },
  { id: 'B', label: 'B判定チェック', questions: questionsB },
  { id: 'C', label: 'C判定チェック', questions: questionsC }
];

var groupIdx = 0, qIdx = 0, currentQuestion = 0;
var totalQuestions = 0;
for (var g = 0; g < allGroups.length; g++) totalQuestions += allGroups[g].questions.length;

function showQuestion() {
  var group = allGroups[groupIdx];
  if (!group) { showResult('C'); return; }
  var q = group.questions[qIdx];
  if (!q) { showResult('C'); return; }
  currentQuestion++;
  document.getElementById('q-step').textContent = 'STEP ' + currentQuestion + ' / ' + totalQuestions;
  document.getElementById('q-text').textContent = q;
  document.getElementById('progress').style.width = ((currentQuestion - 1) / totalQuestions * 100) + '%';
  var groupEl = document.getElementById('q-group');
  groupEl.className = 'q-group ' + group.id;
  groupEl.textContent = group.label;
  var container = document.getElementById('question-container');
  container.style.animation = 'none';
  container.offsetHeight;
  container.style.animation = 'fadeUp .3s ease';
}

function answer(yes) {
  if (yes) { showResult(allGroups[groupIdx].id); return; }
  qIdx++;
  if (qIdx >= allGroups[groupIdx].questions.length) { groupIdx++; qIdx = 0; }
  showQuestion();
}

var results = {
  A: {
    label: 'A — 単発修正',
    title: 'ピンポイント修正',
    desc: '対象が明確な小修正。AIに1回投げて完了コードを受け取る。',
    tags: ['単発プロンプト', 'P2：サンプル行のみ', '最速完了'],
    token: { strategy: 'P2', detail: '該当関数 + 2〜3行のサンプルデータのみ渡す' },
    prompts: [{
      label: 'プロンプトテンプレート',
      text: '目的：\n（何をしたいかを1行で）\n\nこのコードを修正して\n・変更は必要最小限\n・他の部分は絶対に触らない\n・最終コードだけ出して\n\n【制約】\n・ES5準拠（バッククォート・アロー関数禁止）\n・callGAS()パターン使用\n・Code.gs再デプロイ時は新バージョン必須'
    }]
  },
  B: {
    label: 'B — 設計＋実装',
    title: '2段階アプローチ',
    desc: '新機能や複数関数にまたがる変更。設計ドラフト→レビュー仕上げの2段階で品質を担保。',
    tags: ['設計→実装', 'P3：シート単位分割', '品質担保'],
    token: { strategy: 'P3', detail: '関連シートのカラム定義 + 該当関数群のみ。1会話1責務。' },
    prompts: [{
      label: 'Step 1 — ドラフト（設計）',
      text: '目的：\n（やりたいこと）\n\nこの機能を実装して\n・シンプルでOK\n・既存構造に合わせて\n・過剰な最適化は不要\n\n【制約】\n・ES5準拠（バッククォート・アロー関数禁止）\n・callGAS()パターン使用\n・Google Sheets = DB（住民説明会SaaS_DB）\n・全データはplant_idでフィルタ'
    },{
      label: 'Step 2 — レビュー（仕上げ）',
      text: '目的：\n（同上）\n\nこのコードをレビューして\n・設計的に問題があれば修正\n・不要な変更はしない\n・最終的な完成コードを1つにまとめて\n\n【制約】\n・ES5準拠（バッククォート・アロー関数禁止）\n・try-catch + Logger.log 必須\n・Code.gs再デプロイ時は新バージョン必須'
    }]
  },
  C: {
    label: 'C — 段階解析',
    title: 'コンテキスト分割＋段階解析',
    desc: '原因不明・広範囲の問題。まずスキーマ設計で全体把握し、段階的に掘り下げる。',
    tags: ['P1→P3段階移行', 'スキーマ先行', '全体解析'],
    token: { strategy: 'P1→P3', detail: 'まずシート構造（カラム名のみ）で設計確認 → 特定シート単位で実装へ移行' },
    prompts: [{
      label: 'Step 1 — 全体把握（P1：スキーマのみ）',
      text: '目的：\n（何が困っているか）\n\n以下はDB構造（シート名とカラム）：\n・事業者情報：[カラム一覧]\n・発電所情報：[カラム一覧]\n・説明会セッション：[カラム一覧]\n・タスク管理：[カラム一覧]\n\nこの構造を前提に\n・原因を特定して\n・影響範囲を説明して\n・修正方針を提示して（コードはまだ不要）'
    },{
      label: 'Step 2 — 実装（P3：該当部分のみ）',
      text: '目的：\n（同上）\n\n修正方針に基づいて実装して\n・該当関数のコードを以下に貼付：\n[ここにコード]\n\n・最終コードだけ出して\n・不要な変更はしない\n\n【制約】\n・ES5準拠（バッククォート・アロー関数禁止）\n・callGAS()パターン使用\n・try-catch + Logger.log 必須\n・Code.gs再デプロイ時は新バージョン必須'
    },{
      label: '（任意）確認プロンプト',
      text: '目的：\n（同上）\n\nこの修正は妥当か確認して\n・問題があれば最終版を出して\n・影響範囲に漏れがないか検証して'
    }]
  }
};

function showResult(type) {
  var r = results[type];
  document.getElementById('quiz').className = 'quiz-section';
  document.getElementById('lost').className = 'result-section';
  document.getElementById('result').className = 'result-section visible';
  var badge = document.getElementById('r-badge');
  badge.className = 'result-badge ' + type;
  badge.textContent = r.label;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-desc').textContent = r.desc;
  var tagsHtml = '';
  for (var i = 0; i < r.tags.length; i++) tagsHtml += '<span class="tag">' + r.tags[i] + '</span>';
  document.getElementById('r-tags').innerHTML = tagsHtml;
  document.getElementById('r-token').innerHTML = '<dt>' + r.token.strategy + '</dt><dd>' + r.token.detail + '</dd>';
  var container = document.getElementById('prompts-container');
  container.innerHTML = '';
  for (var p = 0; p < r.prompts.length; p++) {
    var prompt = r.prompts[p];
    var block = document.createElement('div');
    block.className = 'prompt-block';
    block.innerHTML =
      '<div class="prompt-header"><span class="prompt-label">' + prompt.label +
      '</span><button class="copy-btn" data-idx="' + p + '">コピー</button></div>' +
      '<div class="prompt-body">' + escapeHtml(prompt.text) + '</div>';
    container.appendChild(block);
  }
  var copyBtns = container.querySelectorAll('.copy-btn');
  for (var c = 0; c < copyBtns.length; c++) {
    (function(btn, prompts) {
      btn.addEventListener('click', function() {
        copyText(prompts[parseInt(btn.getAttribute('data-idx'))].text, btn);
      });
    })(copyBtns[c], r.prompts);
  }
}

function showLost() {
  document.getElementById('quiz').className = 'quiz-section';
  document.getElementById('result').className = 'result-section';
  document.getElementById('lost').className = 'result-section visible';
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyText(text, btn) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { flashCopied(btn); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    flashCopied(btn);
  }
}
function flashCopied(btn) {
  btn.textContent = 'コピー済み'; btn.classList.add('copied');
  setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
}

document.getElementById('lost-copy').addEventListener('click', function() {
  copyText(document.getElementById('lost-prompt').textContent, this);
});

function reset() {
  groupIdx = 0; qIdx = 0; currentQuestion = 0;
  document.getElementById('result').className = 'result-section';
  document.getElementById('lost').className = 'result-section';
  document.getElementById('quiz').className = 'quiz-section visible';
  document.getElementById('progress').style.width = '0%';
  showQuestion();
}

showQuestion();
</script>
</body>
</html>
